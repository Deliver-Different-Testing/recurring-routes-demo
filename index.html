  .scrollbar-thin::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:3px; }

  /* Custom select arrow */
  select { appearance:none; background-image:url("data:image/svg+xml;charset=US-ASCII,%3Csvg width='12' height='12' viewBox='0 0 24 24' fill='none' stroke='%236e6d80' stroke-width='2' xmlns='http://www.w3.org/2000/svg'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E"); background-position:right 10px center; background-repeat:no-repeat; padding-right:32px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo, useEffect } = React;

// ── MOCK DATA ─────────────────────────────────────────────────────────
const COURIERS = [
  { id: 1, code: 'SBC01', name: 'Sarah Bennett',   vehicle: 'Car' },
  { id: 2, code: 'MKL02', name: 'Mike Lawson',     vehicle: 'Van' },
  { id: 3, code: 'PSH03', name: 'Priya Sharma',    vehicle: 'Car' },
  { id: 4, code: 'TBR04', name: 'Tom Brennan',     vehicle: 'Van' },
  { id: 5, code: 'ANE05', name: 'Anita Naidu',     vehicle: 'Car' },
  { id: 6, code: 'JKP06', name: 'James Kapoor',    vehicle: 'Bike' },
];

const POSTCODES = [
  { id: 90012, code: '90012', suburb: 'Downtown LA',         region: 'Downtown' },
  { id: 90013, code: '90013', suburb: 'Arts District',       region: 'Downtown' },
  { id: 90014, code: '90014', suburb: 'Fashion District',    region: 'Downtown' },
  { id: 90017, code: '90017', suburb: 'Westlake',            region: 'Downtown' },
  { id: 90028, code: '90028', suburb: 'Hollywood',           region: 'Hollywood / Mid-City' },
  { id: 90035, code: '90035', suburb: 'Pico-Robertson',      region: 'Hollywood / Mid-City' },
  { id: 90036, code: '90036', suburb: 'Mid-Wilshire',        region: 'Hollywood / Mid-City' },
  { id: 90048, code: '90048', suburb: 'Beverly Grove',       region: 'Hollywood / Mid-City' },
  { id: 90069, code: '90069', suburb: 'West Hollywood',      region: 'Hollywood / Mid-City' },
  { id: 90024, code: '90024', suburb: 'Westwood',            region: 'Westside' },
  { id: 90064, code: '90064', suburb: 'West LA',             region: 'Westside' },
  { id: 90089, code: '90089', suburb: 'USC',                 region: 'Westside' },
  { id: 90095, code: '90095', suburb: 'UCLA',                region: 'Westside' },
  { id: 90230, code: '90230', suburb: 'Culver City',         region: 'Westside' },
  { id: 90291, code: '90291', suburb: 'Venice',              region: 'Westside' },
  { id: 90210, code: '90210', suburb: 'Beverly Hills',       region: 'Beverly Hills' },
  { id: 90211, code: '90211', suburb: 'Beverly Hills South', region: 'Beverly Hills' },
  { id: 90212, code: '90212', suburb: 'Cheviot Hills',       region: 'Beverly Hills' },
  { id: 90245, code: '90245', suburb: 'El Segundo',          region: 'South Bay / Coastal' },
  { id: 90401, code: '90401', suburb: 'Santa Monica',        region: 'South Bay / Coastal' },
  { id: 90402, code: '90402', suburb: 'Santa Monica North',  region: 'South Bay / Coastal' },
  { id: 90404, code: '90404', suburb: 'Santa Monica East',   region: 'South Bay / Coastal' },
];

const INITIAL_ROUTES = [
  { id: 1, name: 'Westside Medical AM',         area: 'Westside',              defaultCourierId: 1, zipcodeIds: [90024, 90064, 90089, 90095, 90230], active: true },
  { id: 2, name: 'Downtown Hospital Loop',      area: 'Downtown',              defaultCourierId: 3, zipcodeIds: [90012, 90013, 90014, 90017],        active: true },
  { id: 3, name: 'Beverly Hills Specialist Run',area: 'Beverly Hills',         defaultCourierId: 2, zipcodeIds: [90210, 90211, 90212, 90035, 90048], active: true },
  { id: 4, name: 'Santa Monica Pharma PM',      area: 'South Bay / Coastal',   defaultCourierId: 4, zipcodeIds: [90401, 90402, 90404, 90291, 90245], active: true },
  { id: 5, name: 'Hollywood / Mid-City Med',    area: 'Hollywood / Mid-City',  defaultCourierId: 5, zipcodeIds: [90028, 90036, 90048, 90069],        active: false },
];

const INITIAL_ROSTER = [
  { id: 1,  routeId: 1, courierId: 1, dayOfWeek: 1, rosterDate: null },
  { id: 2,  routeId: 1, courierId: 1, dayOfWeek: 2, rosterDate: null },
  { id: 3,  routeId: 1, courierId: 1, dayOfWeek: 3, rosterDate: null },
  { id: 4,  routeId: 1, courierId: 3, dayOfWeek: 4, rosterDate: null },
  { id: 5,  routeId: 1, courierId: 3, dayOfWeek: 5, rosterDate: null },
  { id: 6,  routeId: 2, courierId: 3, dayOfWeek: 1, rosterDate: null },
  { id: 7,  routeId: 2, courierId: 3, dayOfWeek: 2, rosterDate: null },
  { id: 8,  routeId: 2, courierId: 3, dayOfWeek: 3, rosterDate: null },
  { id: 9,  routeId: 2, courierId: 3, dayOfWeek: 4, rosterDate: null },
  { id: 10, routeId: 2, courierId: 3, dayOfWeek: 5, rosterDate: null },
  { id: 11, routeId: 2, courierId: 4, dayOfWeek: null, rosterDate: '2026-05-23' },
  ...[1,2,3,4,5].map((dow, i) => ({ id: 100+i, routeId: 3, courierId: 2, dayOfWeek: dow, rosterDate: null })),
  ...[1,2,3,4,5].map((dow, i) => ({ id: 200+i, routeId: 4, courierId: 4, dayOfWeek: dow, rosterDate: null })),
];

const DOW_LABELS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

const courierById = (id) => COURIERS.find(c => c.id === id);
const postcodeById = (id) => POSTCODES.find(p => p.id === id);

function lookupRoster(roster, routeId, date) {
  const iso = date.toISOString().slice(0,10);
  const dateMatch = roster.find(r => r.routeId === routeId && r.rosterDate === iso);
  if (dateMatch) return { courierId: dateMatch.courierId, source: 'date-override' };
  const dow = date.getDay();
  const dowMatch = roster.find(r => r.routeId === routeId && r.rosterDate === null && r.dayOfWeek === dow);
  if (dowMatch) return { courierId: dowMatch.courierId, source: 'pattern' };
  return { courierId: null, source: 'none' };
}

// ── APP SHELL ─────────────────────────────────────────────────────────
function App() {
  const [active, setActive] = useState('routes');
  const [routes, setRoutes] = useState(INITIAL_ROUTES);
  const [roster, setRoster] = useState(INITIAL_ROSTER);

  return (
    <div className="flex h-screen overflow-hidden bg-cream">
      <Sidebar active={active} onSelect={setActive} />
      <main className="flex-1 overflow-y-auto scrollbar-thin">
        <div className="max-w-7xl mx-auto px-8 py-6">
          {active === 'routes' && (
            <RoutesPage routes={routes} setRoutes={setRoutes} roster={roster} />
          )}
          {active === 'roster' && (
            <RosterPage routes={routes} roster={roster} setRoster={setRoster} />
          )}
          {!['routes','roster'].includes(active) && (
            <Placeholder name={active} />
          )}
        </div>
      </main>
    </div>
  );
}

// ── SIDEBAR ───────────────────────────────────────────────────────────
function Sidebar({ active, onSelect }) {
  const sections = [
    { id: 'overview', label: 'Overview', items: [
      { id: 'dashboard', label: 'Dashboard' },
    ]},
    { id: 'network', label: 'Network Partners & Agents', items: [
      { id: 'nps',          label: 'Network Partners' },
      { id: 'agents',       label: 'Agents' },
      { id: 'discovery',    label: 'Discovery' },
      { id: 'quotes',       label: 'Quote Requests' },
      { id: 'onboarding',   label: 'Onboarding' },
    ]},
    { id: 'operations', label: 'Operations', items: [
      { id: 'routes',       label: 'Routes' },
      { id: 'roster',       label: 'Route Roster' },
      { id: 'recruitment',  label: 'Recruitment Pipeline' },
      { id: 'compliance',   label: 'Compliance' },
    ]},
    { id: 'automation', label: 'Automation', items: [
      { id: 'workflows',    label: 'Workflows' },
      { id: 'tasks',        label: 'Tasks' },
    ]},
    { id: 'settings', label: 'Settings', items: [
      { id: 'tenant',       label: 'Tenant Settings' },
    ]},
  ];
  const [open, setOpen] = useState(['operations', 'network']);
  const toggle = (id) => setOpen(o => o.includes(id) ? o.filter(x => x !== id) : [...o, id]);

  return (
    <aside className="w-64 bg-admin-dark text-white flex flex-col flex-shrink-0">
      {/* Brand header */}
      <div className="px-5 py-5 border-b border-white/10">
        <div className="flex items-center gap-2 mb-2">
          <div className="w-8 h-8 rounded-md bg-white/10 flex items-center justify-center">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3bc7f4" strokeWidth="2.2">
              <circle cx="12" cy="12" r="3"/>
              <ellipse cx="12" cy="12" rx="10" ry="4" />
              <ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(60 12 12)" />
              <ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(120 12 12)" />
            </svg>
          </div>
          <div className="font-display text-base font-semibold tracking-tight">DFRNT</div>
        </div>
        <div className="text-[10px] font-semibold tracking-[0.16em] uppercase text-cyan">Configurator</div>
      </div>

      {/* Nav */}
      <nav className="flex-1 py-3 overflow-y-auto scrollbar-thin">
        {sections.map(section => (
          <div key={section.id}>
            <button
              onClick={() => toggle(section.id)}
              className="w-full flex items-center gap-3 px-4 py-2.5 text-left text-white/60 hover:text-white/90 text-[11px] font-semibold tracking-[0.1em] uppercase">
              <span className="flex-1">{section.label}</span>
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"
                   style={{ transform: open.includes(section.id) ? 'rotate(180deg)' : 'none', transition: 'transform 200ms ease' }}>
                <polyline points="6 9 12 15 18 9"/>
              </svg>
            </button>
            {open.includes(section.id) && section.items.map(item => {
              const on = active === item.id;
              return (
                <button key={item.id}
                        onClick={() => onSelect(item.id)}
                        className={`w-full flex items-center px-4 py-2 pl-8 text-[13px] text-left transition-colors ${
                          on
                            ? 'bg-cyan/15 text-cyan font-medium border-r-2 border-cyan'
                            : 'text-white/55 hover:text-white/85 hover:bg-white/[0.04]'
                        }`}>
                  {item.label}
                </button>

            })}
          </div>
        ))}
      </nav>

      {/* User */}
      <div className="px-4 py-3 border-t border-white/10 flex items-center gap-2.5">
        <div className="w-8 h-8 rounded-full bg-[#606DB4] flex items-center justify-center text-[12px] font-semibold">SB</div>
        <div className="flex-1 min-w-0">
          <div className="text-[12.5px] font-medium leading-tight">Steve Bonnici</div>
          <div className="text-[10.5px] text-white/40 truncate">steve@urgent.co.nz</div>
        </div>
      </div>
    </aside>
  );
}

function Placeholder({ name }) {
  const label = {
    dashboard:'Dashboard', nps:'Network Partners', agents:'Agents', discovery:'Discovery',
    quotes:'Quote Requests', onboarding:'Onboarding',
    recruitment:'Recruitment Pipeline', compliance:'Compliance',
    workflows:'Workflows', tasks:'Tasks', tenant:'Tenant Settings'
  }[name] || name;
  return (
    <div>
      <h1 className="font-display text-2xl font-semibold text-ink mb-1">{label}</h1>
      <p className="text-sm text-ink-60 mb-6">Placeholder screen — switch to <button onClick={() => window.location.reload()} className="text-cyan hover:underline font-medium">Routes</button> or <button onClick={() => { document.querySelectorAll('button').forEach(b => { if (b.textContent === 'Route Roster') b.click(); }); }} className="text-cyan hover:underline font-medium">Route Roster</button> to see the full demo.</p>
      <div className="bg-white rounded-xl border border-border p-16 text-center text-ink-60 text-sm">This section is stubbed in the demo.</div>
    </div>
  );
}

// ── ROUTES PAGE ───────────────────────────────────────────────────────
function RoutesPage({ routes, setRoutes, roster }) {
  const [editingRoute, setEditingRoute] = useState(null);

  const handleSave = (route) => {
    if (route.id) {
      setRoutes(rs => rs.map(r => r.id === route.id ? route : r));
    } else {
      const newId = Math.max(...routes.map(r => r.id)) + 1;
      setRoutes(rs => [...rs, { ...route, id: newId }]);
    }
    setEditingRoute(null);
  };

  const handleDelete = (id) => {
    if (!confirm('Soft-delete this route? It will be hidden but not removed.')) return;
    setRoutes(rs => rs.map(r => r.id === id ? { ...r, active: false } : r));
  };

  const rosterCount = (routeId) => roster.filter(r => r.routeId === routeId).length;

  return (
    <div>
      <PageHeader
        title="Routes"
        subtitle="Define named routes covering a cluster of zip codes. Each route is rostered to a courier per day."
        action={
          <button onClick={() => setEditingRoute('new')}
                  className="bg-cyan text-ink font-medium text-[13px] px-5 py-2 rounded-lozenge shadow-card hover:shadow-cyan transition-shadow">
            + Add Route
          </button>
        }
      />

      <div className="bg-white rounded-xl shadow-card overflow-hidden">
        <table className="w-full text-sm">
          <thead className="bg-cream-60 border-b border-border">
            <tr>
              <Th>Name</Th>
              <Th>Area</Th>
              <Th>Default Courier</Th>
              <Th>Zip Codes</Th>
              <Th>Roster</Th>
              <Th>Status</Th>
              <Th align="right">Actions</Th>
            </tr>
          </thead>
          <tbody>
            {routes.map(r => {
              const courier = courierById(r.defaultCourierId);
              return (
                <tr key={r.id} className="border-b border-border-light hover:bg-cream-60 last:border-b-0">
                  <td className="px-4 py-3.5">
                    <button onClick={() => setEditingRoute(r)} className="text-ink font-medium hover:text-cyan">{r.name}</button>
                  </td>
                  <td className="px-4 py-3.5 text-ink-60">{r.area}</td>
                  <td className="px-4 py-3.5 text-ink">
                    {courier ? (
                      <div>
                        <div>{courier.name}</div>
                        <div className="text-[11px] text-ink-60">{courier.code}</div>
                      </div>
                    ) : '—'}
                  </td>
                  <td className="px-4 py-3.5 text-ink-60">
                    <span className="text-ink font-display font-semibold">{r.zipcodeIds.length}</span>
                    <span className="text-[11px] ml-1">codes</span>
                  </td>
                  <td className="px-4 py-3.5 text-ink-60">
                    <span className="text-ink font-display font-semibold">{rosterCount(r.id)}</span>
                    <span className="text-[11px] ml-1">entries</span>
                  </td>
                  <td className="px-4 py-3.5">
                    {r.active ? <Badge tone="green">Active</Badge> : <Badge tone="grey">Inactive</Badge>}
                  </td>
                  <td className="px-4 py-3.5 text-right text-[12.5px] space-x-3">
                    <button onClick={() => setEditingRoute(r)} className="text-ink-60 hover:text-cyan font-medium">Edit</button>
                    <button onClick={() => handleDelete(r.id)} className="text-ink-60 hover:text-red font-medium">Delete</button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {editingRoute && (
        <RouteEditorModal
          route={editingRoute === 'new' ? null : editingRoute}
          onSave={handleSave}
          onClose={() => setEditingRoute(null)}
        />
      )}
    </div>
  );
}

function RouteEditorModal({ route, onSave, onClose }) {
  const [form, setForm] = useState(route || {
    name: '', area: '', defaultCourierId: COURIERS[0].id, zipcodeIds: [], active: true,
  });
  const [search, setSearch] = useState('');

  const selected = form.zipcodeIds.map(postcodeById).filter(Boolean);
  const available = POSTCODES.filter(p =>
    !form.zipcodeIds.includes(p.id) &&
    (search === '' ||
     p.code.includes(search) ||
     p.suburb.toLowerCase().includes(search.toLowerCase()) ||
     p.region.toLowerCase().includes(search.toLowerCase()))
  );

  const addPostcode = (id) => {
    setForm(f => ({ ...f, zipcodeIds: [...f.zipcodeIds, id] }));
    setSearch('');
  };
  const removePostcode = (id) => setForm(f => ({ ...f, zipcodeIds: f.zipcodeIds.filter(z => z !== id) }));

  const valid = form.name.trim() && form.zipcodeIds.length > 0;

  return (
    <div className="fixed inset-0 bg-ink/40 flex items-center justify-center p-4 z-50">
      <div className="bg-white rounded-xl shadow-lift max-w-2xl w-full max-h-[90vh] overflow-hidden flex flex-col">
        <div className="px-6 py-4 border-b border-border flex items-center justify-between">
          <h2 className="font-display text-lg font-semibold text-ink">{route ? 'Edit Route' : 'New Route'}</h2>
          <button onClick={onClose} className="text-ink-60 hover:text-ink text-2xl leading-none w-8 h-8 rounded-full hover:bg-cream flex items-center justify-center">×</button>
        </div>

        <div className="px-6 py-5 overflow-y-auto scrollbar-thin space-y-4">
          <div>
            <Label>Name *</Label>
            <Input type="text" value={form.name} onChange={e => setForm(f => ({...f, name: e.target.value}))}
                   placeholder="e.g. Westside Medical AM" />
          </div>

          <div className="grid grid-cols-2 gap-4">
            <div>
              <Label>Area</Label>
              <Input type="text" value={form.area} onChange={e => setForm(f => ({...f, area: e.target.value}))}
                     placeholder="e.g. Westside" />
            </div>
            <div>
              <Label>Default Courier</Label>
              <Select value={form.defaultCourierId} onChange={e => setForm(f => ({...f, defaultCourierId: parseInt(e.target.value)}))}>
                {COURIERS.map(c => <option key={c.id} value={c.id}>{c.name} ({c.code})</option>)}
              </Select>
            </div>
          </div>

          <div>
            <Label>Zip Codes / Corridor <span className="text-ink-60 font-normal">({selected.length} selected)</span></Label>
            <div className="border border-border rounded-lg p-2.5 min-h-[58px] flex flex-wrap gap-1.5 bg-cream-60">
              {selected.map(p => (
                <span key={p.id} className="chip">
                  <strong>{p.code}</strong>
                  <span>{p.suburb}</span>
                  <button onClick={() => removePostcode(p.id)} title="Remove">×</button>
                </span>
              ))}
              {selected.length === 0 && (
                <span className="text-[12px] text-ink-60 self-center px-2">No zip codes yet — search below to add</span>
              )}
            </div>
            <div className="mt-2 relative">
              <Input type="text" value={search} onChange={e => setSearch(e.target.value)}
                     placeholder="Search zip / suburb / region…" />
              {search && (
                <div className="absolute z-10 mt-1 bg-white border border-border rounded-lg shadow-lift max-h-52 overflow-y-auto w-full scrollbar-thin">
                  {available.slice(0, 10).map(p => (
                    <button key={p.id} onClick={() => addPostcode(p.id)}
                            className="w-full text-left px-3 py-2 text-[13px] hover:bg-cyan-20 border-b border-border-light last:border-b-0 transition-colors">
                      <span className="font-display font-semibold">{p.code}</span>
                      <span className="ml-2 text-ink">{p.suburb}</span>
                      <span className="ml-2 text-[11px] text-ink-60">{p.region}</span>
                    </button>
                  ))}
                  {available.length === 0 && <div className="px-3 py-2 text-[13px] text-ink-60">No matches</div>}
                </div>
              )}
            </div>
          </div>

          <div className="pt-2">
            <label className="flex items-center gap-2.5 text-[13px] text-ink">
              <input type="checkbox" checked={form.active} onChange={e => setForm(f => ({...f, active: e.target.checked}))}
                     className="w-4 h-4 accent-cyan" />
              <span>Active <span className="text-ink-60">(uncheck to soft-delete)</span></span>
            </label>
          </div>
        </div>

        <div className="px-6 py-4 border-t border-border bg-cream-60 flex justify-end gap-2">
          <button onClick={onClose} className="px-5 py-2 text-[13px] text-ink-60 hover:text-ink hover:bg-cream rounded-lozenge font-medium">Cancel</button>
          <button onClick={() => onSave(form)} disabled={!valid}
                  className="bg-cyan text-ink font-medium text-[13px] px-5 py-2 rounded-lozenge disabled:bg-ink-20 disabled:text-ink-60 disabled:cursor-not-allowed hover:shadow-cyan transition-shadow">
            {route ? 'Save Changes' : 'Create Route'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── ROSTER PAGE ───────────────────────────────────────────────────────
function RosterPage({ routes, roster, setRoster }) {
  const activeRoutes = routes.filter(r => r.active);
  const [selectedRouteId, setSelectedRouteId] = useState(activeRoutes[0]?.id);

  useEffect(() => {
    if (!activeRoutes.find(r => r.id === selectedRouteId) && activeRoutes.length) {
      setSelectedRouteId(activeRoutes[0].id);
    }
  }, [routes]);

  if (!activeRoutes.length) {
    return <div className="bg-white rounded-xl p-12 text-center text-ink-60 text-sm">No active routes. Create one on the Routes page first.</div>;
  }

  const route = activeRoutes.find(r => r.id === selectedRouteId);

  return (
    <div>
      <PageHeader
        title="Route Roster"
        subtitle="Set the default weekly pattern, then override specific dates as needed. Date overrides always win over the weekly pattern."
        action={
          <div className="flex items-center gap-2">
            <span className="text-[12px] text-ink-60">Route:</span>
            <Select value={selectedRouteId} onChange={e => setSelectedRouteId(parseInt(e.target.value))} className="min-w-[280px]">
              {activeRoutes.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
            </Select>
          </div>
        }
      />

      {route && <RosterEditor route={route} roster={roster} setRoster={setRoster} />}
    </div>
  );
}

function RosterEditor({ route, roster, setRoster }) {
  const routeRoster = roster.filter(r => r.routeId === route.id);
  const weeklyPattern = routeRoster.filter(r => r.rosterDate === null);
  const dateOverrides = routeRoster.filter(r => r.rosterDate !== null).sort((a, b) => a.rosterDate.localeCompare(b.rosterDate));

  const dowMap = {};
  weeklyPattern.forEach(r => { dowMap[r.dayOfWeek] = r.courierId; });

  const setDowCourier = (dow, courierId) => {
    setRoster(rs => {
      const filtered = rs.filter(r => !(r.routeId === route.id && r.rosterDate === null && r.dayOfWeek === dow));
      if (courierId) {
        const newId = Math.max(0, ...rs.map(r => r.id)) + 1;
        return [...filtered, { id: newId, routeId: route.id, courierId, dayOfWeek: dow, rosterDate: null }];
      }
      return filtered;
    });
  };

  const [newOverrideDate, setNewOverrideDate] = useState('');
  const [newOverrideCourier, setNewOverrideCourier] = useState(COURIERS[0].id);
  const addOverride = () => {
    if (!newOverrideDate || !newOverrideCourier) return;
    const newId = Math.max(0, ...roster.map(r => r.id)) + 1;
    setRoster(rs => [...rs, { id: newId, routeId: route.id, courierId: newOverrideCourier, dayOfWeek: null, rosterDate: newOverrideDate }]);
    setNewOverrideDate('');
  };
  const removeOverride = (id) => setRoster(rs => rs.filter(r => r.id !== id));

  const today = new Date(); today.setHours(0,0,0,0);
  const preview = Array.from({ length: 14 }, (_, i) => {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    const lookup = lookupRoster(roster, route.id, d);
    const courier = courierById(lookup.courierId) ?? courierById(route.defaultCourierId);
    const sourceLabel = lookup.source === 'date-override' ? 'override'
      : lookup.source === 'pattern' ? 'pattern'
      : 'default';
    return { date: d, dow: d.getDay(), courier, source: lookup.courierId ? sourceLabel : 'default' };
  });

  return (
    <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
      <div className="space-y-5">
        <Card title="Default Weekly Pattern"
              subtitle="Courier rostered on each day of week. Leave blank to fall back to the route's default courier.">
          <div className="space-y-2">
            {[1,2,3,4,5,6,0].map(dow => (
              <div key={dow} className="flex items-center gap-3">
                <div className="w-10 text-[12.5px] font-medium text-ink">{DOW_LABELS[dow]}</div>
                <Select value={dowMap[dow] || ''} onChange={e => setDowCourier(dow, e.target.value ? parseInt(e.target.value) : null)} className="flex-1">
                  <option value="">— Use default ({courierById(route.defaultCourierId)?.code}) —</option>
                  {COURIERS.map(c => <option key={c.id} value={c.id}>{c.name} ({c.code})</option>)}
                </Select>
              </div>
            ))}
          </div>
        </Card>

        <Card title="Date Overrides"
              subtitle="Specific-date assignments. Wins over the weekly pattern when both exist for the same date.">
          <div className="space-y-2 mb-4">
            {dateOverrides.length === 0
              ? <div className="text-[12px] text-ink-60 py-2">No date overrides yet.</div>
              : dateOverrides.map(o => {
                  const c = courierById(o.courierId);
                  const d = new Date(o.rosterDate);
                  return (
                    <div key={o.id} className="flex items-center justify-between bg-orange-20 border border-orange/30 px-3 py-2 rounded-lg">
                      <div>
                        <span className="text-[13px] font-medium text-ink">
                          {d.toLocaleDateString('en-US', { weekday: 'short', day: 'numeric', month: 'short' })}
                        </span>
                        <span className="text-[13px] text-ink ml-3">→ {c?.name} ({c?.code})</span>
                      </div>
                      <button onClick={() => removeOverride(o.id)} className="text-ink-60 hover:text-red text-[12px] font-medium">Remove</button>
                    </div>
                  );
                })}
          </div>
          <div className="flex items-end gap-2 pt-3 border-t border-border-light">
            <div className="flex-1">
              <Label small>Date</Label>
              <Input type="date" value={newOverrideDate} onChange={e => setNewOverrideDate(e.target.value)} />
            </div>
            <div className="flex-1">
              <Label small>Courier</Label>
              <Select value={newOverrideCourier} onChange={e => setNewOverrideCourier(parseInt(e.target.value))}>
                {COURIERS.map(c => <option key={c.id} value={c.id}>{c.code} — {c.name}</option>)}
              </Select>
            </div>
            <button onClick={addOverride} disabled={!newOverrideDate}
                    className="bg-cyan text-ink font-medium text-[13px] px-4 py-2 rounded-lozenge disabled:bg-ink-20 disabled:text-ink-60 disabled:cursor-not-allowed hover:shadow-cyan transition-shadow">
              Add
            </button>
          </div>
        </Card>
      </div>

      <div>
        <Card title="14-Day Preview"
              subtitle="Who's rostered for this route over the next 14 days. Date overrides → weekly pattern → default courier.">
          <div className="space-y-1">
            {preview.map((p, i) => {
              const baseClass = 'flex items-center justify-between px-3 py-2 rounded-lg text-[13px]';
              const variant = p.source === 'override'
                ? 'bg-orange-20'
                : i === 0
                  ? 'bg-cyan-20'
                  : 'hover:bg-cream-60';
              return (
                <div key={i} className={`${baseClass} ${variant}`}>
                  <div className="flex items-center gap-3">
                    <div className="w-20 text-ink-60">
                      {p.date.toLocaleDateString('en-US', { weekday: 'short', day: 'numeric', month: 'short' })}
                    </div>
                    {i === 0 && <Badge tone="cyan" small>Today</Badge>}
                  </div>
                  <div className="flex items-center gap-3">
                    <div className="text-ink">
                      {p.courier ? `${p.courier.name} (${p.courier.code})` : <span className="text-ink-60">Unassigned</span>}
                    </div>
                    <Badge tone={p.source === 'override' ? 'orange' : p.source === 'pattern' ? 'grey' : 'grey-light'} small>
                      {p.source}
                    </Badge>
                  </div>
                </div>
              );
            })}
          </div>
        </Card>

        <div className="mt-4 bg-cyan-20 border border-cyan/30 rounded-xl p-4 text-[12.5px] text-ink">
          <div className="font-display font-semibold mb-1">How this is used downstream</div>
          The same precedence logic (date override → DOW pattern → default courier) runs in <code className="bg-white px-1.5 py-0.5 rounded text-[11.5px] font-mono">uspPrebookSet</code> each night.
          The courier it picks is written to <code className="bg-white px-1.5 py-0.5 rounded text-[11.5px] font-mono">tucJob.ucjbCourierID</code> for every materialised recurring job in this route.
          RunViewer then displays each day's run with the rostered courier.
        </div>
      </div>
    </div>
  );
}

// ── COMPONENTS ────────────────────────────────────────────────────────
function PageHeader({ title, subtitle, action }) {
  return (
    <div className="flex items-start justify-between mb-6">
      <div>
        <h1 className="font-display text-2xl font-semibold text-ink leading-tight">{title}</h1>
        {subtitle && <p className="text-[13px] text-ink-60 mt-1.5 max-w-2xl">{subtitle}</p>}
      </div>
      {action}
    </div>
  );
}

function Card({ title, subtitle, children }) {
  return (
    <div className="bg-white rounded-xl shadow-card">
      <div className="px-5 py-4 border-b border-border-light">
        <div className="font-display text-[15px] font-semibold text-ink">{title}</div>
        {subtitle && <div className="text-[12px] text-ink-60 mt-0.5">{subtitle}</div>}
      </div>
      <div className="p-5">{children}</div>
    </div>
  );
}

function Th({ children, align = 'left' }) {
  return <th className={`px-4 py-3 text-${align} font-medium text-[10.5px] tracking-[0.08em] uppercase text-ink-60`}>{children}</th>;
}

function Label({ children, small }) {
  return <label className={`block ${small ? 'text-[11px] mb-1' : 'text-[12.5px] mb-1.5'} font-medium text-ink-60`}>{children}</label>;
}

function Input(props) {
  return <input {...props} className={`w-full px-3 py-2 border border-border rounded-lg text-[13px] text-ink bg-white focus:outline-none focus:ring-2 focus:ring-cyan/50 focus:border-cyan ${props.className || ''}`} />;
}

function Select({ children, className = '', ...props }) {
  return <select {...props} className={`px-3 py-2 border border-border rounded-lg text-[13px] text-ink bg-white focus:outline-none focus:ring-2 focus:ring-cyan/50 focus:border-cyan ${className}`}>{children}</select>;
}

function Badge({ children, tone, small }) {
  const tones = {
    green:      'bg-green-20 text-green',
    orange:     'bg-orange-20 text-orange',
    cyan:       'bg-cyan-20 text-ink',
    grey:       'bg-cream text-ink-60',
    'grey-light':'bg-cream-60 text-ink-60',
  };
  return (
    <span className={`inline-flex items-center gap-1 ${small ? 'text-[10.5px] px-1.5 py-0.5' : 'text-[11.5px] px-2 py-0.5'} font-medium rounded-lozenge ${tones[tone] || tones.grey}`}>
      {tone === 'green' && <span className="w-1.5 h-1.5 rounded-full bg-green"/>}
      {children}
    </span>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
